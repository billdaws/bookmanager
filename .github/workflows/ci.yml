name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go test -race ./...

  bench:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run benchmarks
        run: GOMAXPROCS=2 go test -bench=. -benchmem -run='^$' -count=1 ./internal/storage/db/ ./internal/web/ | tee bench-output.txt

      - uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: go
          output-file-path: bench-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: 200%
          fail-on-alert: true

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go test -tags e2e ./internal/e2e/...
        env:
          CHROMIUM_BIN: /usr/bin/google-chrome
