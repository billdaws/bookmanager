{{define "confirm-delete"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookmanager — Delete {{.Library.Name}}</title>
</head>
<body>
    <a href="/library/{{.Library.ID}}">← Cancel</a>
    <h1>Delete "{{.Library.Name}}"?</h1>
    <p>This will remove the library and its book list. The files on disk will not be affected.</p>
    <p>Type <strong>{{.Library.Name}}</strong> to confirm.</p>

    {{if .Error}}
    <p class="error">{{.Error}}</p>
    {{end}}

    <form action="/library/{{.Library.ID}}/delete" method="post">
        <input type="text" name="name" placeholder="{{.Library.Name}}" autofocus>
        <button type="submit">Delete library</button>
    </form>
</body>
</html>
{{end}}
