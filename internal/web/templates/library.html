{{define "library"}}
<!doctype html>
<html lang="en">
  <head>
    {{template "head" .}}
    <title>Bookmanager — {{.Library.Name}}</title>
  </head>
  <body>
    <a href="/">← All libraries</a>
    <h1>{{.Library.Name}}</h1>

    {{if .SyncError}}
    <p class="error">sync error: {{.SyncError}}</p>
    {{end}}
    <p>{{len .Books}} book(s) in <code>{{.Library.Directory}}</code></p>

    <article>
      <div style="text-align: right">
        <a href="/library/{{.Library.ID}}" role="button">Refresh</a>
      </div>
      {{template "book-list" .Books}}
      <div style="text-align: right">
        <a href="/library/{{.Library.ID}}/delete" role="button" class="danger">Delete library</a>
      </div>
    </article>

    <script>
      const source = new EventSource("/library/{{.Library.ID}}/events");
      source.addEventListener("books-updated", function (e) {
        document.getElementById("book-list").outerHTML = e.data;
      });
      window.addEventListener("beforeunload", () => source.close());
    </script>
  </body>
</html>
{{end}}
