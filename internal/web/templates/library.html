{{define "library"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookmanager — {{.Library.Name}}</title>
</head>
<body>
    <a href="/">← All libraries</a>
    <h1>{{.Library.Name}}</h1>
    <form action="/library/{{.Library.ID}}/delete" method="get">
        <button type="submit">Delete library</button>
    </form>
    <form action="/library/{{.Library.ID}}" method="get">
        <button type="submit">Refresh</button>
    </form>

    {{if .SyncError}}
    <p class="error">sync error: {{.SyncError}}</p>
    {{end}}
    <p>{{len .Books}} book(s) in <code>{{.Library.Directory}}</code></p>

    <ul>
    {{range .Books}}
        <li>{{.Filename}}</li>
    {{else}}
        <li>No books found.</li>
    {{end}}
    </ul>

    <script src="/static/htmx.min.js"></script>
</body>
</html>
{{end}}
