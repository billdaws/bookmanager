{{define "setup"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookmanager — Setup</title>
</head>
<body>
    <h1>Welcome to Bookmanager</h1>
    <p>No library configured yet. Enter details below to get started.</p>

    {{if .Error}}
    <p class="error">{{.Error}}</p>
    {{end}}

    <form action="/library" method="post"
          hx-post="/library"
          hx-target="body"
          hx-swap="outerHTML">
        <label for="name">Library name</label>
        <input id="name" name="name" type="text" required
               value="{{.Name}}" placeholder="My Library">

        <label for="directory">Directory path</label>
        <input id="directory" name="directory" type="text" required
               value="{{.Directory}}" placeholder="/home/user/books">

        <button type="submit">Set up library</button>
    </form>

    <script src="/static/htmx.min.js"></script>
</body>
</html>
{{end}}
