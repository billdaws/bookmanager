{{define "index"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookmanager</title>
</head>
<body>
    <h1>Libraries</h1>
    <form action="/library/new" method="get">
        <button type="submit">Add library</button>
    </form>

    {{if .Libraries}}
    <ul>
    {{range .Libraries}}
        <li><a href="/library/{{.ID}}">{{.Name}}</a> <code>{{.Directory}}</code></li>
    {{end}}
    </ul>
    {{else}}
    <p>No libraries yet.</p>
    {{end}}

    <script src="/static/htmx.min.js"></script>
</body>
</html>
{{end}}
