version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: bookmanager
    main: ./cmd/bookmanager
    binary: bookmanager
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^build:"
      - "^chore:"
      - "^ci:"
      - "^docs:"
      - "^refactor:"
      - "^revert:"
      - "^style:"
      - "^test:"
